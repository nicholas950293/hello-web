<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-7-2 · 詳解</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2em; }
    .coins { display: flex; gap: 16px; margin-bottom: 1em; }
    .coin {
      width: 100px; height: 100px;
      display: grid; place-items: center;
      border: 2px solid #d1d5db; border-radius: 50%;
      font-size: 1.2rem;
    }
    .coin.active { background: gold; font-weight: bold; }
    button { padding: .5em 1.2em; border-radius: 8px; border: 1px solid #d1d5db; cursor: pointer; }
  </style>
</head>
<body>
  <div class="coins">
    <div class="coin" id="head">正面</div>
    <div class="coin" id="tail">反面</div>
  </div>
  <button id="flip">隨機</button>

  <script>
    const head = document.querySelector("#head");
    const tail = document.querySelector("#tail");
    const flip = document.querySelector("#flip");

    flip.addEventListener("click", function () {
      head.classList.remove("active"); // 先清掉舊的高亮
      tail.classList.remove("active");
      if (Math.random() < 0.5) {
        head.classList.add("active"); // 一半機率正面
      } else {
        tail.classList.add("active"); // 一半機率反面
      }
    });
  </script>
</body>
</html>
